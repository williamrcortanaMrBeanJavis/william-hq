<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>William's HQ</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #000;
  cursor: pointer;
}
.bg {
  position: fixed; inset: 0;
  background: url('assets/mrbean-onepiece-captain.jpg') center center / contain no-repeat;
  background-color: #000;
  animation: breathe 6s ease-in-out infinite;
}
@keyframes breathe {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.03); }
}
.vignette {
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.6) 100%);
}
.tap-hint {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  color: rgba(255,255,255,0.5);
  letter-spacing: 3px;
  text-transform: uppercase;
  animation: fadeInOut 3s ease-in-out infinite;
}
@keyframes fadeInOut {
  0%, 100% { opacity: 0; }
  50% { opacity: 1; }
}
.fade-out {
  position: fixed; inset: 0;
  background: #000;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.8s ease;
  z-index: 100;
}
.fade-out.active { opacity: 1; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300&display=swap" rel="stylesheet">
</head>
<body>
<div class="bg"></div>
<div class="vignette"></div>
<div class="tap-hint">tap to enter</div>
<div class="fade-out" id="fadeOut"></div>
<script>
document.body.addEventListener('click', () => {
  const f = document.getElementById('fadeOut');
  f.classList.add('active');
  setTimeout(() => window.location.href = 'index.html', 800);
});
</script>
</body>
</html>
